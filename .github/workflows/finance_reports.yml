name: Finance Reports

on:
  schedule:
    # 每日08:00 - 综合市场报告
    - cron: '0 0 * * *'
    # 每日22:25 - 美股报告
    - cron: '25 14 * * *'
    # 每12小时 - 油价报告
    - cron: '0 */12 * * *'
    # 每4小时 - 海湾战争简报
    - cron: '0 */4 * * *'
    # 每12小时 - 美元指数报告
    - cron: '30 */12 * * *'
    # 周六07:30 - A股分析
    - cron: '30 7 * * 6'
    # 周六10:30 - 每周市场报告
    - cron: '30 10 * * 6'
    # 每日09:33 - 国际媒体海湾新闻
    - cron: '33 9 * * *'
    # 每日15:05 - 热门板块分析（A股收盘后）
    - cron: '5 7 * * 1-5'
    # 每月2日09:00 - 月度资本市场分析报告
    - cron: '0 9 2 * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 smtplib
      - name: Run daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          RECEIVER_EMAIL_2: ${{ secrets.RECEIVER_EMAIL_2 }}
        run: python daily_finance.py

  us-stock-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '25 14 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run US stock report
        env:
